<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekend Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #efefec;
      --text: #1a1a18;
      --text-secondary: #6b6b66;
      --text-tertiary: #9e9e99;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --blue: #378ADD;
      --blue-dark: #185FA5;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text: #f0f0ec;
        --text-secondary: #a0a09a;
        --text-tertiary: #6a6a65;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 0 4rem;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .date-label { font-size: 13px; color: var(--text-secondary); }
    .day-label { font-size: 22px; font-weight: 600; color: var(--text); }

    .remaining-label { font-size: 13px; color: var(--text-secondary); text-align: right; }
    .remaining-count { font-size: 22px; font-weight: 600; text-align: right; }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: right;
      margin-bottom: 1.25rem;
    }

    /* Cards */
    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 13px 15px;
      margin-bottom: 1.25rem;
    }
    .card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    /* Setup */
    .setup-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .setup-row input {
      flex: 1;
      min-width: 180px;
      font-size: 13px;
      padding: 8px 10px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      outline: none;
    }
    .setup-row input:focus { border-color: var(--blue); }

    .cal-status { font-size: 12px; margin-top: 8px; }
    .cal-status.ok { color: #3B6D11; }
    .cal-status.err { color: #A32D2D; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-google { background: var(--blue); color: white; }
    .btn-google:hover { background: var(--blue-dark); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { background: var(--green-dark); }
    .btn-outline {
      background: none;
      color: var(--text-secondary);
      border: 0.5px solid var(--border-mid);
    }
    .btn-outline:hover { background: var(--bg-secondary); color: var(--text); }
    .btn-ghost {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: var(--font);
    }
    .btn-ghost:hover { color: var(--text-secondary); }

    /* Filter row */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 12px; color: var(--text-tertiary); }
    .chip {
      font-size: 12px;
      padding: 4px 11px;
      border-radius: 99px;
      border: 0.5px solid var(--border-mid);
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
      transition: all 0.15s;
    }
    .chip.active {
      background: var(--bg-secondary);
      color: var(--text);
      border-color: var(--border-mid);
    }
    .filter-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 6px; }

    .task-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 11px 13px;
      display: flex;
      align-items: flex-start;
      gap: 11px;
      transition: opacity 0.3s, border-color 0.2s;
    }
    .task-card:hover { border-color: var(--border-mid); }
    .task-card.done { opacity: 0.45; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text-tertiary); }
    .task-card.done .task-time { text-decoration: line-through; }
    .task-card.cal-event { border-left: 2.5px solid var(--blue); }
    .task-card.cal-event.done { border-left-color: var(--border); }

    .check-wrap { padding-top: 2px; flex-shrink: 0; }
    .check-wrap input[type="checkbox"] {
      width: 17px; height: 17px;
      cursor: pointer;
      accent-color: var(--green);
    }

    .cal-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #E6F1FB;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 500; line-height: 1.4; }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 3px;
      flex-wrap: wrap;
    }
    .task-time { font-size: 12px; color: var(--text-secondary); }
    .task-location {
      font-size: 12px;
      color: var(--blue-dark);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }
    .tag-errands  { background: #E6F1FB; color: #185FA5; }
    .tag-home     { background: #FAEEDA; color: #854F0B; }
    .tag-health   { background: #EAF3DE; color: #3B6D11; }
    .tag-admin    { background: #EEEDFE; color: #3C3489; }
    .tag-calendar { background: #E6F1FB; color: #185FA5; }

    .delete-btn {
      background: none; border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 14px;
      padding: 3px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      transition: color 0.15s, background 0.15s;
    }
    .delete-btn:hover { color: var(--text); background: var(--bg-secondary); }

    .divider-label {
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 10px 0 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Add task */
    .add-btn {
      width: 100%;
      padding: 12px;
      background: none;
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-lg);
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      margin-top: 10px;
    }
    .add-btn:hover {
      background: var(--bg-secondary);
      color: var(--text);
      border-style: solid;
    }

    .add-form {
      background: var(--bg);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 13px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-top: 10px;
    }
    .form-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .form-row input[type="text"],
    .form-row input[type="time"],
    .form-row select {
      font-size: 13px;
      padding: 8px 10px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      outline: none;
    }
    .form-row input[type="text"] { flex: 1; min-width: 160px; font-size: 14px; }
    .form-row input:focus, .form-row select:focus { border-color: var(--blue); }
    .form-sep { font-size: 13px; color: var(--text-tertiary); }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

    @media (prefers-color-scheme: dark) {
      .cal-icon { background: #0C447C; }
      .tag-errands, .tag-calendar { background: #0C447C; color: #B5D4F4; }
      .tag-home    { background: #633806; color: #FAC775; }
      .tag-health  { background: #27500A; color: #C0DD97; }
      .tag-admin   { background: #3C3489; color: #CECBF6; }
      .task-location { color: #85B7EB; }
      .cal-status.ok { color: #97C459; }
      .cal-status.err { color: #F09595; }
    }

    @media (max-width: 480px) {
      body { padding: 0.5rem; }
      .app { padding: 1rem 0 3rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="date-label" id="date-label"></div>
      <div class="day-label" id="day-label"></div>
    </div>
    <div>
      <div class="remaining-label">tasks left</div>
      <div class="remaining-count" id="remaining-count">0</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="prog-text">0 of 0 complete</div>

  <!-- Google Calendar setup -->
  <div class="card" id="setup-banner">
    <p>Connect Google Calendar to pull today's events into your list.</p>
    <div class="setup-row">
      <input type="text" id="cal-id-input" placeholder="Calendar ID  (usually your Gmail address)" />
      <button class="btn btn-google" id="signin-btn" onclick="startOAuth()">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="white">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
    <div class="cal-status" id="cal-status"></div>
  </div>

  <!-- Filter row (shown after sign-in) -->
  <div class="filter-row" id="filter-row" style="display:none;">
    <span class="filter-label">show:</span>
    <button class="chip active" data-filter="all"      onclick="setFilter('all')">all</button>
    <button class="chip"        data-filter="tasks"    onclick="setFilter('tasks')">my tasks</button>
    <button class="chip"        data-filter="calendar" onclick="setFilter('calendar')">calendar</button>
    <button class="chip"        data-filter="location" onclick="setFilter('location')">has location</button>
    <div class="filter-actions">
      <button class="btn-ghost" onclick="fetchCalendar()">↻ refresh</button>
      <button class="btn-ghost" onclick="signOut()">sign out</button>
    </div>
  </div>

  <!-- Task list -->
  <div class="task-list" id="task-list"></div>

  <!-- Add task -->
  <button class="add-btn" id="add-btn" onclick="showForm()">+ add task</button>
  <div class="add-form" id="add-form" style="display:none;">
    <div class="form-row">
      <input type="text" id="new-title" placeholder="task name..." />
    </div>
    <div class="form-row">
      <input type="time" id="new-start" />
      <span class="form-sep">to</span>
      <input type="time" id="new-end" />
      <select id="new-tag">
        <option value="errands">errands</option>
        <option value="home">home</option>
        <option value="health">health</option>
        <option value="admin">admin</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="hideForm()">cancel</button>
      <button class="btn btn-green"   onclick="saveTask()">add task</button>
    </div>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const CLIENT_ID    = '451013372558-r77l7knno1pgob7vkbi9hv3jdr19qobi.apps.googleusercontent.com';
  const SCOPES       = 'https://www.googleapis.com/auth/calendar.readonly';
  const TASKS_KEY    = 'wknd_tasks_v1';
  const TOKEN_KEY    = 'wknd_token_v1';
  const EVENTS_KEY   = 'wknd_cal_events_v1';
  const CAL_ID_KEY   = 'wknd_cal_id';

  // ── State ───────────────────────────────────────────────────────────────────
  let tasks       = [];
  let calEvents   = [];
  let activeFilter = 'all';
  let accessToken  = null;
  let tokenExpiry  = 0;

  // ── Boot ────────────────────────────────────────────────────────────────────
  function boot() {
    setHeader();
    loadState();
    if (accessToken && Date.now() < tokenExpiry) {
      showConnected();
      if (calEvents.length) renderAll();
      else fetchCalendar();
    } else {
      renderAll();
    }
  }

  function loadState() {
    try { const r = localStorage.getItem(TASKS_KEY);  if (r) tasks = JSON.parse(r); } catch(e){}
    try {
      const t = JSON.parse(localStorage.getItem(TOKEN_KEY) || 'null');
      if (t && t.expiry > Date.now()) { accessToken = t.token; tokenExpiry = t.expiry; }
    } catch(e){}
    try {
      const ev = JSON.parse(localStorage.getItem(EVENTS_KEY) || 'null');
      if (ev && ev.date === todayStr()) calEvents = ev.events;
    } catch(e){}
    const savedId = localStorage.getItem(CAL_ID_KEY);
    if (savedId) document.getElementById('cal-id-input').value = savedId;

    if (!tasks.length) {
      tasks = [
        { id:1, title:'Grocery run',    start:'09:00', end:'10:00', tag:'errands', done:false },
        { id:2, title:'Mow the lawn',   start:'10:30', end:'11:30', tag:'home',    done:false },
        { id:3, title:'Morning walk',   start:'07:30', end:'08:15', tag:'health',  done:false },
      ];
      saveTasks();
    }
  }

  function saveTasks() {
    try { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); } catch(e){}
  }

  // ── OAuth ───────────────────────────────────────────────────────────────────
  function startOAuth() {
    const calId = document.getElementById('cal-id-input').value.trim();
    if (!calId) { showStatus('Enter your Calendar ID first (usually your Gmail address).', false); return; }
    localStorage.setItem(CAL_ID_KEY, calId);

    const params = new URLSearchParams({
      client_id:     CLIENT_ID,
      redirect_uri:  window.location.origin + window.location.pathname,
      response_type: 'token',
      scope:         SCOPES,
      prompt:        'consent',
    });
    const popup = window.open(
      'https://accounts.google.com/o/oauth2/v2/auth?' + params,
      'google_oauth',
      'width=520,height=620,left=200,top=80'
    );

    const poll = setInterval(() => {
      try {
        if (!popup || popup.closed) { clearInterval(poll); return; }
        const url = popup.location.href;
        if (url.includes('access_token')) {
          clearInterval(poll);
          popup.close();
          const hash  = new URLSearchParams(url.split('#')[1] || '');
          const token = hash.get('access_token');
          const exp   = parseInt(hash.get('expires_in') || '3600');
          if (token) {
            accessToken  = token;
            tokenExpiry  = Date.now() + exp * 1000;
            try { localStorage.setItem(TOKEN_KEY, JSON.stringify({ token: accessToken, expiry: tokenExpiry })); } catch(e){}
            showConnected();
            fetchCalendar();
          }
        }
      } catch(e) { /* cross-origin — keep polling */ }
    }, 600);
  }

  function signOut() {
    accessToken = null; calEvents = [];
    try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(EVENTS_KEY); } catch(e){}
    document.getElementById('setup-banner').style.display = 'block';
    document.getElementById('filter-row').style.display   = 'none';
    renderAll();
  }

  function showConnected() {
    document.getElementById('setup-banner').style.display = 'none';
    document.getElementById('filter-row').style.display   = 'flex';
  }

  // ── Calendar fetch ───────────────────────────────────────────────────────────
  async function fetchCalendar() {
    if (!accessToken || Date.now() > tokenExpiry) {
      showStatus('Session expired — please sign in again.', false);
      document.getElementById('setup-banner').style.display = 'block';
      document.getElementById('filter-row').style.display   = 'none';
      accessToken = null;
      return;
    }
    const calId = localStorage.getItem(CAL_ID_KEY) || document.getElementById('cal-id-input').value.trim();
    if (!calId) { showStatus('No Calendar ID found.', false); return; }
    showStatus('Loading events…', null);

    const now   = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const end   = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toISOString();
    const url   = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`
                + `?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=50`;
    try {
      const res  = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
      const data = await res.json();
      if (data.error) { showStatus('Google error: ' + data.error.message, false); return; }

      calEvents = (data.items || []).map(e => ({
        id:          'cal_' + e.id,
        title:       e.summary || '(no title)',
        start:       isoToTime(e.start?.dateTime || e.start?.date),
        end:         isoToTime(e.end?.dateTime   || e.end?.date),
        location:    e.location || '',
        tag:         'calendar',
        done:        false,
        isCalEvent:  true,
      }));

      try { localStorage.setItem(EVENTS_KEY, JSON.stringify({ date: todayStr(), events: calEvents })); } catch(e){}
      showStatus(`${calEvents.length} event${calEvents.length !== 1 ? 's' : ''} loaded`, true);
      renderAll();
    } catch(err) {
      showStatus('Network error — check your connection.', false);
    }
  }

  function showStatus(msg, ok) {
    const el = document.getElementById('cal-status');
    el.textContent = msg;
    el.className   = 'cal-status' + (ok === true ? ' ok' : ok === false ? ' err' : '');
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderAll() {
    const all = [...tasks, ...calEvents];
    let visible = all;
    if (activeFilter === 'tasks')    visible = tasks;
    else if (activeFilter === 'calendar') visible = calEvents;
    else if (activeFilter === 'location') visible = all.filter(t => t.location);

    // Progress (tasks only)
    const done  = tasks.filter(t => t.done).length;
    const total = tasks.length;
    const pct   = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('prog-fill').style.width  = pct + '%';
    document.getElementById('prog-text').textContent   = `${done} of ${total} tasks complete`;
    document.getElementById('remaining-count').textContent = total - done;

    const sorted = [...visible].sort((a, b) => {
      if (!a.isCalEvent && !b.isCalEvent && a.done !== b.done) return a.done ? 1 : -1;
      if (a.start && b.start) return a.start.localeCompare(b.start);
      return a.start ? -1 : b.start ? 1 : 0;
    });

    let html = '', shownDone = false;
    for (const t of sorted) {
      if (!t.isCalEvent && t.done && !shownDone) {
        html += `<div class="divider-label">completed</div>`;
        shownDone = true;
      }
      const timeStr = t.start ? fmt12(t.start) + (t.end ? ' – ' + fmt12(t.end) : '') : '';
      const locHtml = t.location
        ? `<span class="task-location">
             <svg width="9" height="12" viewBox="0 0 12 16" fill="currentColor">
               <path d="M6 0C3.24 0 1 2.24 1 5c0 3.75 5 11 5 11s5-7.25 5-11c0-2.76-2.24-5-5-5zm0 7.5A2.5 2.5 0 1 1 6 2.5a2.5 2.5 0 0 1 0 5z"/>
             </svg>${escHtml(t.location)}
           </span>` : '';

      const leftEl = t.isCalEvent
        ? `<div class="cal-icon">
             <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round">
               <rect x="1" y="2" width="10" height="9" rx="1.5"/>
               <path d="M1 5h10M4 1v2M8 1v2"/>
             </svg>
           </div>`
        : `<div class="check-wrap">
             <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" />
           </div>`;

      const deleteBtn = t.isCalEvent
        ? ''
        : `<button class="delete-btn" onclick="deleteTask(${t.id})" title="remove">✕</button>`;

      html += `
        <div class="task-card ${t.isCalEvent ? 'cal-event' : ''} ${t.done ? 'done' : ''}">
          ${leftEl}
          <div class="task-body">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-meta">
              ${timeStr ? `<span class="task-time">${timeStr}</span>` : ''}
              <span class="tag tag-${t.tag}">${t.tag}</span>
              ${locHtml}
            </div>
          </div>
          ${deleteBtn}
        </div>`;
    }

    if (!html) {
      html = `<div style="font-size:14px;color:var(--text-tertiary);padding:1rem 0;">nothing here for this filter</div>`;
    }
    document.getElementById('task-list').innerHTML = html;
  }

  // ── Task actions ─────────────────────────────────────────────────────────────
  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; saveTasks(); renderAll(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderAll();
  }

  function showForm() {
    document.getElementById('add-form').style.display = 'flex';
    document.getElementById('add-btn').style.display  = 'none';
    document.getElementById('new-title').focus();
  }

  function hideForm() {
    document.getElementById('add-form').style.display = 'none';
    document.getElementById('add-btn').style.display  = 'block';
    ['new-title','new-start','new-end'].forEach(id => document.getElementById(id).value = '');
  }

  function saveTask() {
    const title = document.getElementById('new-title').value.trim();
    if (!title) return;
    tasks.push({
      id:    Date.now(),
      title,
      start: document.getElementById('new-start').value,
      end:   document.getElementById('new-end').value,
      tag:   document.getElementById('new-tag').value,
      done:  false,
    });
    saveTasks(); hideForm(); renderAll();
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    renderAll();
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function isoToTime(iso) {
    if (!iso || iso.length === 10) return '';
    const d = new Date(iso);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function fmt12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'pm' : 'am'}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setHeader() {
    const now = new Date();
    document.getElementById('date-label').textContent =
      now.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
    document.getElementById('day-label').textContent =
      now.toLocaleDateString('en-US', { weekday:'long' });
  }

  boot();
</script>
</body>
</html>
